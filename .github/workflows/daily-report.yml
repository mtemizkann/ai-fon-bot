name: Daily Fund Report

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run AI fund bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m fon_ai_bot.cli \
            --prices sample_prices.csv \
            --config config.sample.toml \
            --broker paper \
            --state portfolio_state.json \
            --notify telegram

      - name: Commit updated state
        run: |
          if git diff --quiet -- portfolio_state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add portfolio_state.json
          if git diff --cached --quiet; then
            echo "No staged changes to commit after rebase."
            exit 0
          fi
          git commit -m "chore: update fund bot state"
          git push origin "HEAD:${GITHUB_REF_NAME}"
